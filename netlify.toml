[build]
  command = "npm run build"
  publish = "dist"

# Redirect www → non-www (301 permanent)
[[redirects]]
  from = "https://www.alafafe.com/*"
  to   = "https://alafafe.com/:splat"
  status = 301
  force  = true

# Remove .html extension for clean, crawlable URLs (301 permanent)
[[redirects]]
  from = "/auto.html"
  to   = "/auto"
  status = 301
  force  = true

[[redirects]]
  from = "/habitation.html"
  to   = "/habitation"
  status = 301
  force  = true

